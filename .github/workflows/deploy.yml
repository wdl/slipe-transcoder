name: Deploy

# Disabled: only fires when manually dispatched, and the job is gated off.
# Remove `if: false` and add a `push:` trigger when ready to enable.
on:
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: false
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.stage || 'dev' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      # Workaround: aws-cdk-lib 2.250+ ships a bundled-dep metadata mismatch
      # (cloud-assembly-api declares jsonschema ~1.4.1 but bundles 1.5.0) that
      # makes `npm ci` reject the lockfile. Runtime is unaffected.
      - run: npm install --no-audit --no-fund

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - run: npm run cdk:deploy -- -c stage=${{ github.event.inputs.stage || 'dev' }}
